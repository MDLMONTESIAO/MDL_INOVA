<!DOCTYPE html>
<html lang="pt-BR">

<title>3 palavrinhas</title>

<style>

}

.container {
    max-width: 900px;
    margin: auto;
    background: #fff;
    padding: 30px;
    border-radius: 12px;

    color: #333;
    margin-bottom: 5px;
}

.meta {
    color: #666;

pre {
    background: #fafafa;
    padding: 20px;
    border-radius: 8px;
    overflow-x: auto;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
}

pre i {
    color: #d63384;
    font-weight: bold;
    font-style: normal;
    background: #fdf0f5;
    padding: 2px 5px;
    border-radius: 4px;
}

pre u {
    text-decoration: none;
    color: #0d6efd;
    font-weight: 600;
}

.creditos {
    text-align: center;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #e9ecef;
    color: #6c757d;
    font-size: 0.9em;

</style>
</head>
